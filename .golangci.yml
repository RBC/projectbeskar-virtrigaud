# golangci-lint configuration for VirtRigaud
version: "2"

run:
  timeout: 10m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - misspell
    - unconvert
  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # package-level comments — low value
        - "-ST1003" # naming conventions (vmId etc.) — requires broad interface refactor
        - "-ST1005" # error string capitalization
        - "-ST1023" # redundant type in declaration
        - "-QF1011" # redundant type in declaration (v2 rename of ST1023)
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (github.com/projectbeskar/virtrigaud/internal/storage.Storage).Close
        - os.Remove
